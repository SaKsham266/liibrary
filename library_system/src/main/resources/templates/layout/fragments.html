<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title}">Library Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm border-bottom" th:fragment="navbar(activePage)">
    <div class="container py-1">
        <a class="navbar-brand d-flex align-items-center gap-2 fw-semibold" th:href="@{/ui/dashboard}">
            <span class="brand-icon"><i class="bi bi-book-half"></i></span>
            <span>Library System</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
                aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0 gap-lg-2">
                <li class="nav-item">
                    <a class="nav-link px-3 rounded-pill"
                       th:classappend="${activePage == 'dashboard'} ? ' active'"
                       th:href="@{/ui/dashboard}">
                        <i class="bi bi-speedometer2 me-1"></i>Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link px-3 rounded-pill"
                       th:classappend="${activePage == 'books'} ? ' active'"
                       th:href="@{/ui/books}">
                        <i class="bi bi-journals me-1"></i>Books
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link px-3 rounded-pill"
                       th:classappend="${activePage == 'members'} ? ' active'"
                       th:href="@{/ui/members}">
                        <i class="bi bi-people me-1"></i>Members
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<footer class="mt-auto border-top py-4 bg-white" th:fragment="footer">
    <div class="container d-flex justify-content-between align-items-center flex-wrap gap-2">
        <p class="mb-0 text-muted small">Library Management System</p>
        <p class="mb-0 text-muted small">Built with Spring Boot + Thymeleaf</p>
    </div>
</footer>

<div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            crossorigin="anonymous"></script>
</div>
</body>
</html>
