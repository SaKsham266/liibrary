<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | Library System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="login-page">
<main class="login-shell container-fluid">
    <div class="row g-0 min-vh-100">
        <section class="col-12 col-lg-7 login-hero d-flex flex-column justify-content-center px-4 px-md-5">
            <div class="login-brand mb-4">
                <span class="login-brand-icon"><i class="bi bi-book-half"></i></span>
                <span>Library System</span>
            </div>
            <h1 class="login-title">Secure access for your library operations</h1>
            <p class="login-subtitle mb-4">
                Manage books, members, and transactions in one place with role-based access control.
            </p>
            <div class="login-pill">Default password for seeded users: <strong>qwerty</strong></div>
        </section>

        <section class="col-12 col-lg-5 login-panel-wrap d-flex align-items-center justify-content-center p-4 p-md-5">
            <div class="login-panel w-100">
                <h2 class="h4 mb-2 login-form-title">Welcome back</h2>
                <p class="text-muted mb-4">Sign in with your account credentials.</p>

                <div class="alert alert-danger" th:if="${param.error}">
                    Invalid username or password.
                </div>
                <div class="alert alert-success" th:if="${param.logout}">
                    You have been logged out.
                </div>

                <form th:action="@{/login}" method="post" class="d-grid gap-3">
                    <div>
                        <label for="username" class="form-label">Username</label>
                        <input id="username" name="username" type="text" class="form-control form-control-lg"
                               placeholder="Enter username" required autofocus>
                    </div>
                    <div>
                        <label for="password" class="form-label">Password</label>
                        <input id="password" name="password" type="password" class="form-control form-control-lg"
                               placeholder="Enter password" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg login-btn">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                    </button>
                </form>
            </div>
        </section>
    </div>
</main>
</body>
</html>
