<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/fragments :: head('Books | Library System')}"></head>
<body class="d-flex flex-column min-vh-100 app-surface">
<nav th:replace="~{layout/fragments :: navbar('books')}"></nav>

<main class="container py-4 py-lg-5">
    <section class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
        <div>
            <h1 class="h3 mb-1">Books</h1>
            <p class="text-muted mb-0">Manage your catalog in one place.</p>
        </div>
        <a class="btn btn-primary rounded-pill px-4" th:href="@{/ui/books/new}">
            <i class="bi bi-plus-circle me-1"></i>Add Book
        </a>
    </section>

    <div class="alert alert-success border-0 shadow-sm" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="alert alert-danger border-0 shadow-sm" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <section class="card border-0 table-card">
        <div class="table-responsive">
            <table class="table align-middle mb-0">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Title</th>
                    <th>Author</th>
                    <th>Publisher</th>
                    <th>Status</th>
                    <th class="text-end">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(books)}">
                    <td colspan="6" class="text-center py-4 text-muted">No books found.</td>
                </tr>
                <tr th:each="book : ${books}">
                    <td th:text="${book.bookId}">1</td>
                    <td class="fw-medium" th:text="${book.title}">Book Title</td>
                    <td th:text="${book.author}">Author</td>
                    <td th:text="${book.publisher}">Publisher</td>
                    <td>
                        <span class="badge rounded-pill"
                              th:classappend="${book.available} ? ' text-bg-success' : ' text-bg-warning'"
                              th:text="${book.available} ? 'Available' : 'Issued'">Available</span>
                    </td>
                    <td class="text-end">
                        <div class="d-inline-flex gap-2">
                            <a class="btn btn-sm btn-outline-primary rounded-pill"
                               th:href="@{'/ui/books/' + ${book.bookId} + '/edit'}">
                                <i class="bi bi-pencil-square me-1"></i>Edit
                            </a>
                            <form th:action="@{'/ui/books/' + ${book.bookId} + '/delete'}" method="post">
                                <button type="submit" class="btn btn-sm btn-outline-danger rounded-pill"
                                        onclick="return confirm('Delete this book?');">
                                    <i class="bi bi-trash3 me-1"></i>Delete
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>

<footer th:replace="~{layout/fragments :: footer}"></footer>
<div th:replace="~{layout/fragments :: scripts}"></div>
</body>
</html>
