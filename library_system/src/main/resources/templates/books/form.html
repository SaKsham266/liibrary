<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/fragments :: head(${pageTitle} + ' | Library System')}"></head>
<body class="d-flex flex-column min-vh-100 app-surface">
<nav th:replace="~{layout/fragments :: navbar('books')}"></nav>

<main class="container py-4 py-lg-5">
    <section class="row justify-content-center">
        <div class="col-12 col-lg-8 col-xl-7">
            <div class="card border-0 form-card">
                <div class="card-body p-4 p-lg-5">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h1 class="h4 mb-0" th:text="${pageTitle}">Add Book</h1>
                        <a class="btn btn-outline-secondary btn-sm rounded-pill" th:href="@{/ui/books}">
                            <i class="bi bi-arrow-left me-1"></i>Back
                        </a>
                    </div>

                    <form method="post" th:action="${formAction}" th:object="${bookForm}" novalidate>
                        <div class="mb-3">
                            <label class="form-label" for="title">Title</label>
                            <input id="title" type="text" class="form-control"
                                   th:field="*{title}"
                                   th:classappend="${#fields.hasErrors('title')} ? ' is-invalid' : ''"
                                   placeholder="Enter book title">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="author">Author</label>
                            <input id="author" type="text" class="form-control"
                                   th:field="*{author}"
                                   th:classappend="${#fields.hasErrors('author')} ? ' is-invalid' : ''"
                                   placeholder="Enter author name">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('author')}" th:errors="*{author}"></div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label" for="publisher">Publisher</label>
                            <input id="publisher" type="text" class="form-control"
                                   th:field="*{publisher}"
                                   th:classappend="${#fields.hasErrors('publisher')} ? ' is-invalid' : ''"
                                   placeholder="Enter publisher name">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('publisher')}" th:errors="*{publisher}"></div>
                        </div>

                        <button type="submit" class="btn btn-primary rounded-pill px-4" th:text="${submitText}">Save Book</button>
                    </form>
                </div>
            </div>
        </div>
    </section>
</main>

<footer th:replace="~{layout/fragments :: footer}"></footer>
<div th:replace="~{layout/fragments :: scripts}"></div>
</body>
</html>
